plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'com.mytv.app'
    compileSdk 33

    defaultConfig {
        applicationId "com.mytv.app"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.10.1'
    implementation 'androidx.leanback:leanback:1.0.0' // Giao diện TV
    implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
}
